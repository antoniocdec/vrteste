<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Box 3D Real</title>

<style>
body { margin: 0; overflow: hidden; }
canvas { display: block; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r155/three.min.js"></script>
</head>

<body>

<script>
// ===== CENA =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// parâmetros VR
const eyeDistance = 0.06; // distância entre olhos

// câmeras
const cameraL = new THREE.PerspectiveCamera(75, 0.5, 0.1, 100);
const cameraR = new THREE.PerspectiveCamera(75, 0.5, 0.1, 100);

// chão
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshBasicMaterial({ color: 0x555555 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// parede
const wall = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 5),
  new THREE.MeshBasicMaterial({ color: 0xdddddd })
);
wall.position.set(0, 2.5, -6);
scene.add(wall);

// objetos (símbolos)
function addBox(x, color) {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.8, 0.2),
    new THREE.MeshBasicMaterial({ color })
  );
  mesh.position.set(x, 2, -5.5);
  scene.add(mesh);
}

addBox(-2.5, 0xff0000);
addBox(0, 0x0000ff);
addBox(2.5, 0x00ff00);

// giroscópio
let alpha = 0, beta = 0;

window.addEventListener("deviceorientation", (e) => {
  alpha = e.alpha || 0;
  beta = e.beta || 0;
});

// render loop
function animate() {
  requestAnimationFrame(animate);

  const rotY = THREE.MathUtils.degToRad(alpha);
  const rotX = THREE.MathUtils.degToRad(beta);

  // posição base (centro dos olhos)
  const base = new THREE.Vector3(0, 1.6, 0);

  // deslocamento lateral dos olhos
  const right = new THREE.Vector3(eyeDistance, 0, 0);
  const left = new THREE.Vector3(-eyeDistance, 0, 0);

  // aplicar rotação do corpo
  const rotMatrix = new THREE.Matrix4().makeRotationY(rotY);

  const camLPos = left.clone().applyMatrix4(rotMatrix).add(base);
  const camRPos = right.clone().applyMatrix4(rotMatrix).add(base);

  cameraL.position.copy(camLPos);
  cameraR.position.copy(camRPos);

  cameraL.lookAt(base);
  cameraR.lookAt(base);

  cameraL.rotation.x += rotX;
  cameraR.rotation.x += rotX;

  // render lado esquerdo
  renderer.setScissorTest(true);

  renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
  renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
  renderer.render(scene, cameraL);

  // render lado direito
  renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
  renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
  renderer.render(scene, cameraR);
}

animate();
</script>

</body>
</html>
