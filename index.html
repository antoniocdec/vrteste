<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Box Split Screen</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* duas telas lado a lado */
.half {
  width: 50vw;
  height: 100vh;
  float: left;
}
canvas {
  display: block;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r155/three.min.js"></script>
</head>

<body>

<div id="left" class="half"></div>
<div id="right" class="half"></div>

<script>
// ===== CENA =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// câmera esquerda e direita
const cameraL = new THREE.PerspectiveCamera(75, 0.5, 0.1, 100);
const cameraR = new THREE.PerspectiveCamera(75, 0.5, 0.1, 100);

// renderer
const rendererL = new THREE.WebGLRenderer();
rendererL.setSize(window.innerWidth/2, window.innerHeight);
document.getElementById("left").appendChild(rendererL.domElement);

const rendererR = new THREE.WebGLRenderer();
rendererR.setSize(window.innerWidth/2, window.innerHeight);
document.getElementById("right").appendChild(rendererR.domElement);

// chão
const floorGeo = new THREE.PlaneGeometry(20,20);
const floorMat = new THREE.MeshBasicMaterial({color:0x555555});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// parede
const wallGeo = new THREE.PlaneGeometry(10,5);
const wallMat = new THREE.MeshBasicMaterial({color:0xdddddd});
const wall = new THREE.Mesh(wallGeo, wallMat);
wall.position.z = -5;
wall.position.y = 2.5;
scene.add(wall);

// símbolos
function box(x,color){
  const geo = new THREE.BoxGeometry(0.8,0.8,0.2);
  const mat = new THREE.MeshBasicMaterial({color});
  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.set(x,2,-4.8);
  scene.add(mesh);
}

box(-3,0xff0000);
box(0,0x0000ff);
box(3,0x00ff00);

// giroscópio
let alpha = 0, beta = 0;

window.addEventListener("deviceorientation", (e)=>{
  alpha = e.alpha || 0;
  beta = e.beta || 0;
});

// animação
function animate(){
  requestAnimationFrame(animate);

  // movimento da cabeça
  cameraL.position.set(0,1.6,0);
  cameraR.position.set(0,1.6,0);

  cameraL.rotation.y = THREE.MathUtils.degToRad(alpha);
  cameraR.rotation.y = THREE.MathUtils.degToRad(alpha);

  cameraL.rotation.x = THREE.MathUtils.degToRad(beta);
  cameraR.rotation.x = THREE.MathUtils.degToRad(beta);

  rendererL.render(scene, cameraL);
  rendererR.render(scene, cameraR);
}

animate();
</script>

</body>
</html>
