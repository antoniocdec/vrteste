<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Box OK</title>

<style>
body { margin: 0; overflow: hidden; background: black; }
canvas { display: block; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r155/three.min.js"></script>
</head>

<body>

<script>

// ===== CENA =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// câmeras
const cameraL = new THREE.PerspectiveCamera(70, 0.5, 0.1, 100);
const cameraR = new THREE.PerspectiveCamera(70, 0.5, 0.1, 100);

// chão (IMPORTANTE: mais próximo)
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(50, 50),
  new THREE.MeshBasicMaterial({ color: 0x444444 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// parede (MUITO IMPORTANTE: mais perto!)
const wall = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 5),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
);
wall.position.set(0, 2, -4);
scene.add(wall);

// objetos bem próximos da câmera
function box(x, color) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.8, 0.8),
    new THREE.MeshBasicMaterial({ color })
  );
  m.position.set(x, 2, -3);
  scene.add(m);
}

box(-2, 0xff0000);
box(0, 0x0000ff);
box(2, 0x00ff00);

// giroscópio
let alpha = 0;

window.addEventListener("deviceorientation", (e) => {
  alpha = e.alpha || 0;
});

// distância entre olhos
const eye = 0.05;

// loop
function animate() {
  requestAnimationFrame(animate);

  const rotY = THREE.MathUtils.degToRad(alpha);

  const base = new THREE.Vector3(0, 1.6, 0);

  const leftEye = new THREE.Vector3(-eye, 0, 0);
  const rightEye = new THREE.Vector3(eye, 0, 0);

  const rot = new THREE.Matrix4().makeRotationY(rotY);

  cameraL.position.copy(leftEye.clone().applyMatrix4(rot).add(base));
  cameraR.position.copy(rightEye.clone().applyMatrix4(rot).add(base));

  cameraL.lookAt(0, 1.6, -3);
  cameraR.lookAt(0, 1.6, -3);

  const w = window.innerWidth;
  const h = window.innerHeight;

  renderer.setViewport(0, 0, w/2, h);
  renderer.render(scene, cameraL);

  renderer.setViewport(w/2, 0, w/2, h);
  renderer.render(scene, cameraR);
}

animate();

</script>

</body>
</html>
