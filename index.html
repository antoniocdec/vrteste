<!DOCTYPE html>
<html>
<body>
<h1 id="dados">Mova o celular</h1>

<script>
window.addEventListener("deviceorientation", function(event) {
  document.getElementById("dados").innerHTML =
    "Alpha: " + event.alpha + "<br>" +
    "Beta: " + event.beta + "<br>" +
    "Gamma: " + event.gamma;
});
</script>

</body>
</html><!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Jogo VR Box</title>
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

<script>
AFRAME.registerComponent('gaze-select', {
  init: function () {
    let timer;
    this.el.addEventListener('mouseenter', () => {
      timer = setTimeout(() => {
        this.el.setAttribute('color', '#FFD700');

        let score = document.querySelector('#score');
        let pontos = parseInt(score.getAttribute('value').split(': ')[1]);
        pontos++;
        score.setAttribute('value', 'Pontos: ' + pontos);

        // Move para outra posição aleatória
        this.el.setAttribute(
          'position',
          {
            x: (Math.random()*8)-4,
            y: 1 + Math.random()*3,
            z: -6 + Math.random()*(-4)
          }
        );
      }, 2000);
    });

    this.el.addEventListener('mouseleave', () => {
      clearTimeout(timer);
    });
  }
});
</script>
</head>

<body>

<a-scene>

  <!-- Céu -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- Chão -->
  <a-plane position="0 0 -8"
           rotation="-90 0 0"
           width="30"
           height="30"
           color="#777">
  </a-plane>

  <!-- Iluminação -->
  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional"
           position="1 3 2"
           intensity="0.5">
  </a-light>

  <!-- Câmera -->
  <a-entity position="0 1.6 0">
      <a-camera>
          <a-cursor color="yellow"
                    fuse="true"
                    fuse-timeout="2000">
          </a-cursor>
      </a-camera>
  </a-entity>

  <!-- Painel -->
  <a-plane position="0 4 -5"
           width="4"
           height="1"
           color="white">
  </a-plane>

  <a-text id="score"
          value="Pontos: 0"
          color="black"
          align="center"
          position="-1 4 -4.9">
  </a-text>

  <!-- Símbolos -->
  <a-box class="target"
         gaze-select
         position="-3 2 -8"
         color="red">
  </a-box>

  <a-sphere class="target"
            gaze-select
            radius="0.5"
            position="-1 2 -8"
            color="blue">
  </a-sphere>

  <a-cylinder class="target"
              gaze-select
              radius="0.4"
              height="1"
              position="1 2 -8"
              color="green">
  </a-cylinder>

  <a-cone class="target"
          gaze-select
          radius-bottom="0.5"
          height="1"
          position="3 2 -8"
          color="orange">
  </a-cone>

  <a-torus class="target"
           gaze-select
           radius="0.5"
           radius-tubular="0.1"
           position="0 3 -10"
           color="purple">
  </a-torus>

</a-scene>

</body>
</html>
