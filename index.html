<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Auto Box Game</title>

<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

<script>
// Componente de seleção por olhar
AFRAME.registerComponent('gaze', {
  init: function () {
    let timer;

    this.el.addEventListener('mouseenter', () => {
      timer = setTimeout(() => {
        this.el.setAttribute('color', '#FFD700');

        let scoreEl = document.querySelector('#score');
        let pontos = parseInt(scoreEl.getAttribute('value'));
        pontos++;
        scoreEl.setAttribute('value', pontos);

        // reposiciona o alvo
        this.el.setAttribute('position', {
          x: (Math.random() * 6) - 3,
          y: 1 + Math.random() * 2,
          z: -4 - Math.random() * 3
        });

      }, 2000);
    });

    this.el.addEventListener('mouseleave', () => {
      clearTimeout(timer);
    });
  }
});
</script>

</head>

<body>

<a-scene vr-mode-ui="enabled: true" embedded>

  <!-- Força ambiente VR (melhor para VR Box) -->
  <a-entity camera look-controls position="0 1.6 0">

    <!-- Mira fixa no centro -->
    <a-ring radius-inner="0.01"
            radius-outer="0.02"
            color="white"
            position="0 0 -1">
    </a-ring>

  </a-entity>

  <!-- Céu -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- Chão -->
  <a-plane rotation="-90 0 0"
           width="20"
           height="20"
           color="#666">
  </a-plane>

  <!-- Luz -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- Painel de pontuação -->
  <a-plane position="0 3 -4"
           width="2"
           height="0.6"
           color="white">
  </a-plane>

  <a-text id="score"
          value="0"
          color="black"
          align="center"
          position="0 3 -3.9">
  </a-text>

  <!-- PAREDE DE SÍMBOLOS -->
  <a-box gaze position="-2 1.5 -4"
         color="red">
  </a-box>

  <a-sphere gaze position="0 1.5 -4"
            radius="0.4"
            color="blue">
  </a-sphere>

  <a-cylinder gaze position="2 1.5 -4"
              radius="0.3"
              height="0.8"
              color="green">
  </a-cylinder>

  <a-cone gaze position="0 2.8 -5"
          radius-bottom="0.4"
          height="0.8"
          color="orange">
  </a-cone>

</a-scene>

<script>
// tenta forçar fullscreen automaticamente
window.onload = () => {
  const scene = document.querySelector('a-scene');
  if (scene.requestFullscreen) {
    scene.requestFullscreen().catch(()=>{});
  }
};
</script>

</body>
</html>
