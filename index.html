<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reta Afim em AR (Hiro)</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    #panel {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      z-index: 999;
      border-radius: 8px;
    }

    input {
      width: 50px;
    }

    button {
      margin-top: 5px;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="panel">
  <div>Ponto 1: <input id="x1" placeholder="x1"> <input id="y1" placeholder="y1"></div>
  <div>Ponto 2: <input id="x2" placeholder="x2"> <input id="y2" placeholder="y2"></div>
  <button onclick="drawLine()">Desenhar reta</button>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  
  <!-- Marcador Hiro -->
  <a-marker preset="hiro" id="marker">

    <!-- Linha -->
    <a-entity id="lineEntity"
              line="start: 0 0 0; end: 1 1 0; color: red">
    </a-entity>

    <!-- Pontos -->
    <a-sphere id="p1" radius="0.05" color="blue"></a-sphere>
    <a-sphere id="p2" radius="0.05" color="green"></a-sphere>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  // escala para caber no marcador
  const scale = 0.1;

  function drawLine() {
    let x1 = parseFloat(document.getElementById("x1").value);
    let y1 = parseFloat(document.getElementById("y1").value);
    let x2 = parseFloat(document.getElementById("x2").value);
    let y2 = parseFloat(document.getElementById("y2").value);

    if (isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2)) {
      alert("Digite valores válidos!");
      return;
    }

    // converte para AR (plano do marcador: X e Y)
    let X1 = x1 * scale;
    let Y1 = y1 * scale;

    let X2 = x2 * scale;
    let Y2 = y2 * scale;

    // atualiza linha
    let line = document.querySelector("#lineEntity");
    line.setAttribute("line", {
      start: `${X1} ${Y1} 0`,
      end: `${X2} ${Y2} 0`,
      color: "red"
    });

    // atualiza pontos
    document.querySelector("#p1").setAttribute("position", `${X1} ${Y1} 0`);
    document.querySelector("#p2").setAttribute("position", `${X2} ${Y2} 0`);
  }
</script>

</body>
</html>
